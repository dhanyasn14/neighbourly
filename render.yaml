services:
  - type: web
    name: neighborly
    runtime: node
    plan: free
    buildCommand: npm ci --prefix server && npm ci --prefix client && npm run build --prefix client
    startCommand: npm start --prefix server
    healthCheckPath: /api/health
    autoDeployTrigger: commit
    envVars:
      - key: NODE_ENV
        value: production
      - key: FORCE_HTTPS
        value: "true"
      - key: MONGO_URI
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: 8h
      - key: RESET_OTP_SECRET
        generateValue: true
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_MODEL
        value: gpt-5.4-mini
      - key: OPENAI_TIMEOUT_MS
        value: "30000"
      - key: SMTP_HOST
        value: smtp.gmail.com
      - key: SMTP_PORT
        value: "465"
      - key: SMTP_SECURE
        value: "true"
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: MAIL_FROM_EMAIL
        sync: false
      - key: ALERT_FROM_EMAIL
        sync: false
      - key: ADMIN_NOTIFY_EMAIL
        sync: false
